<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tala — تالا</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Vazirmatn:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Vazirmatn', system-ui, sans-serif;
      background:
        radial-gradient(ellipse at 50% -20%, #3a1b25 0%, #1f0f15 40%, #0a0608 100%);
      color: #F0DFC0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* Smooth/elegant scrollbar inside phone */
    *::-webkit-scrollbar { width: 0; height: 0; }
    button { font-family: inherit; }
    img { -webkit-user-drag: none; }
    .num { font-feature-settings: "tnum" on, "lnum" on; }

    /* Story-viewer entry — runs once on mount, no React state needed */
    @keyframes tala-story-in {
      0%   { transform: translateY(18px) scale(0.96); opacity: 0; }
      100% { transform: translateY(0)    scale(1);    opacity: 1; }
    }
    .tala-story-enter {
      animation: tala-story-in 380ms cubic-bezier(.2,.8,.2,1) both;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/tweaks-panel.jsx"></script>
  <script type="text/babel" src="components/ui.jsx"></script>
  <script type="text/babel" src="components/data.jsx"></script>
  <script type="text/babel" src="../gallery/screen-gallery.jsx"></script>
  <script type="text/babel" src="../showroom/screen-showroom.jsx"></script>
  <script type="text/babel" src="../price-board/screen-price.jsx"></script>
  <script type="text/babel" src="../favorites/screen-favorites.jsx"></script>
  <script type="text/babel" src="../gallery/screen-story.jsx"></script>
  <script type="text/babel" src="components/app.jsx"></script>

  <script type="text/babel">
    // Babel scripts with src= load asynchronously; poll until App is defined.
    function mountTala() {
      if (typeof window.App !== 'function') {
        return setTimeout(mountTala, 30);
      }
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    }
    mountTala();
  </script>
</body>
</html>
